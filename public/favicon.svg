    <rect x="8" y="8" width="48" height="6" rx="1"/>
    <polygon points="12,14 52,14 47,21 17,21"/>
    <polygon points="18,21 46,21 49,49 15,49"/>
    <polygon points="13,49 51,49 54,55 10,55"/>
    <rect x="9" y="55" width="46" height="6" rx="1"/>
  </g>
</svg>
